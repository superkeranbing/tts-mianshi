services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: tts-postgres
    environment:
      POSTGRES_DB: tts_mianshi
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d tts_mianshi"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: tts-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: tts-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
      - ./minio/init.sh:/docker-entrypoint-init.d/init.sh
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  backend:
    build: ../backend
    container_name: tts-backend
    environment:
      DATABASE_URL: postgresql://dev:dev123@postgres:5432/tts_mianshi
      SYNC_DATABASE_URL: postgresql://dev:dev123@postgres:5432/tts_mianshi
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: tts-mianshi
      STORAGE_BACKEND: minio
      CORS_ORIGINS: http://localhost
      DEBUG: "false"
    volumes:
      - uploads:/app/uploads
      - models:/app/models
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery-worker:
    build:
      context: ../backend
      dockerfile: Dockerfile.gpu     # Dockerfile.gpu for GPU
    container_name: tts-celery-worker
    command: celery -A celery_worker worker -l info --without-gossip --without-mingle --without-heartbeat
    gpus: all
    environment:
      DATABASE_URL: postgresql://dev:dev123@postgres:5432/tts_mianshi
      SYNC_DATABASE_URL: postgresql://dev:dev123@postgres:5432/tts_mianshi
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: tts-mianshi
      STORAGE_BACKEND: minio
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - uploads:/app/uploads
      - models:/app/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery-beat:
    build: ../backend
    container_name: tts-celery-beat
    command: celery -A celery_worker beat -l info
    environment:
      DATABASE_URL: postgresql://dev:dev123@postgres:5432/tts_mianshi
      SYNC_DATABASE_URL: postgresql://dev:dev123@postgres:5432/tts_mianshi
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: tts-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  miniodata:
  uploads:
  models:
