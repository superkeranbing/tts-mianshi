# Server A: backend + infrastructure
# Deploy: docker compose -f docker-compose.backend.yml up -d --build

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: asr-postgres
    environment:
      POSTGRES_DB: asr_mianshi
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev123
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d asr_mianshi"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - asr-net

  redis:
    image: redis:7-alpine
    container_name: asr-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - asr-net

  minio:
    image: minio/minio:latest
    container_name: asr-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - miniodata:/data
      - ./minio/init.sh:/docker-entrypoint-init.d/init.sh
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - asr-net

  backend:
    build: ../backend
    container_name: asr-backend
    ports:
      - "8000:8000"                          # Must be exposed for frontend server
    env_file:
      - ../backend/.env
    environment:
      DATABASE_URL: postgresql://dev:dev123@postgres:5432/asr_mianshi
      SYNC_DATABASE_URL: postgresql://dev:dev123@postgres:5432/asr_mianshi
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: asr-mianshi
      STORAGE_BACKEND: minio
      CORS_ORIGINS: http://FRONTEND_SERVER_IP,http://FRONTEND_SERVER_DOMAIN
      JWT_SECRET: change-me-use-openssl-rand-hex-32
      DEBUG: "false"
    volumes:
      - uploads:/app/uploads
      - models:/app/models
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - asr-net

  celery-worker:
    build:
      context: ../backend
      dockerfile: Dockerfile.gpu
    container_name: asr-celery-worker
    command: celery -A celery_worker worker -l info --without-gossip --without-mingle --without-heartbeat
    gpus: all
    env_file:
      - ../backend/.env
    environment:
      DATABASE_URL: postgresql://dev:dev123@postgres:5432/asr_mianshi
      SYNC_DATABASE_URL: postgresql://dev:dev123@postgres:5432/asr_mianshi
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: asr-mianshi
      STORAGE_BACKEND: minio
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - uploads:/app/uploads
      - models:/app/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - asr-net

  celery-beat:
    build: ../backend
    container_name: asr-celery-beat
    command: celery -A celery_worker beat -l info
    env_file:
      - ../backend/.env
    environment:
      DATABASE_URL: postgresql://dev:dev123@postgres:5432/asr_mianshi
      SYNC_DATABASE_URL: postgresql://dev:dev123@postgres:5432/asr_mianshi
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: asr-mianshi
      STORAGE_BACKEND: minio
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - asr-net

volumes:
  pgdata:
  miniodata:
  uploads:
  models:

networks:
  asr-net:
    driver: bridge
